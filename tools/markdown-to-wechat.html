<!DOCTYPE html>
<html lang="zh-CN">
<head>

<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<style>

.header {

}

.main-container {

}

.editor-pane, .preview-pane {

}

.editor-pane { margin-right: 5px; }

.pane-header {

}

/* ж»ҡеҠЁжқЎзҫҺеҢ– */

}
#preview-content::-webkit-scrollbar-thumb,

}

}

/* Toast жҸҗзӨә */
.toast {

  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #333;
  color: #fff;
  padding: 10px 24px;
  border-radius: 4px;
  font-size: 14px;
  z-index: 9999;
  pointer-events: none;
  transition: transform 0.3s ease;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* еҫ®дҝЎд»Јз Ғеқ— */
#nice .code-snippet__fix {
  word-wrap: break-word !important;
  font-size: 14px;

@media (max-width: 768px) {

</style>
</head>
<body>

<div class="header">
  <h1>рҹ“қ Markdown иҪ¬еҫ®дҝЎе…¬дј—еҸ·</h1>
  <div class="header-actions">
    <button class="btn" onclick="loadSample()" title="еҠ иҪҪзӨәдҫӢ">рҹ“„ <span class="label">зӨәдҫӢ</span></button>
    <button class="btn" onclick="clearAll()" title="жё…з©ә">рҹ—‘ <span class="label">жё…з©ә</span></button>
    <button class="btn btn-success" onclick="copyToWechat()" title="еӨҚеҲ¶еҲ°еҫ®дҝЎ">рҹ“Ӣ <span class="label">еӨҚеҲ¶еҲ°еҫ®дҝЎе…¬дј—еҸ·</span></button>
    <button class="btn btn-primary" onclick="exportHTML()" title="еҜјеҮәHTML">рҹ’ҫ <span class="label">еҜјеҮә HTML</span></button>
  </div>
</div>

<div class="main-container">
  <!-- зј–иҫ‘еҢә -->
  <div class="editor-pane">
    <div class="pane-header">
      <span>вңҸпёҸ Markdown зј–иҫ‘</span>
      <span style="font-size:11px;color:#999" id="char-count">0 еӯ—</span>
    </div>
    <textarea id="markdown-editor" placeholder="еңЁжӯӨиҫ“е…Ҙ Markdown еҶ…е®№...&#10;&#10;ж”ҜжҢҒпјҡж ҮйўҳгҖҒеҲ—иЎЁгҖҒеј•з”ЁгҖҒй“ҫжҺҘгҖҒд»Јз Ғеқ—гҖҒиЎЁж јгҖҒеӣҫзүҮгҖҒи„ҡжіЁзӯү"></textarea>
  </div>

  <!-- йў„и§ҲеҢә -->
  <div class="preview-pane">
    <div class="pane-header">рҹ‘Ғ е®һж—¶йў„и§ҲпјҲй»ҳи®Өдё»йўҳпјү</div>
    <div id="preview-content">
      <section id="nice" data-tool="markdown2wechat" data-website="https://github.com">
        <p style="color:#999;text-align:center;margin-top:60px;">еңЁе·Ұдҫ§иҫ“е…Ҙ MarkdownпјҢиҝҷйҮҢдјҡе®һж—¶жҳҫзӨәйў„и§Ҳж•Ҳжһң</p>
      </section>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ Marked иҮӘе®ҡд№үжёІжҹ“еҷЁ ============
const renderer = new marked.Renderer();

// ж Үйўҳ - ж·»еҠ  prefix/content/suffix span з»“жһ„
renderer.heading = function(text, level) {
  return `<h${level}><span class="prefix"></span><span class="content">${text}</span><span class="suffix"></span></h${level}>`;
};

// еҲ—иЎЁйЎ№ - ж·»еҠ  section еҢ…иЈ№
renderer.listitem = function(text) {
  // marked v4+ passes tokens object; handle both string and token cases
  const textStr = typeof text === 'string' ? text : (text.text || '');
  let content = textStr;
  // еҰӮжһңеҶ…е®№дёҚжҳҜд»Ҙ HTML ж ҮзӯҫејҖеӨҙпјҢз”Ё section еҢ…иЈ№
  if (content && !content.trimStart().startsWith('<') && !content.trimStart().startsWith('<input')) {
    content = `<section>${content}</section>`;
  }
  return `<li>${content}</li>`;
};

// ж®өиҗҪ
renderer.paragraph = function(text) {
  return `<p>${text}</p>`;
};

// й“ҫжҺҘ - еҫ®дҝЎеӨ–й“ҫиҪ¬и„ҡжіЁ
renderer.link = function(href, title, text) {
  // еҫ®дҝЎеҸӘж”ҜжҢҒ mp.weixin.qq.com еҹҹеҗҚзҡ„й“ҫжҺҘ
  const isWechatLink = href && href.includes('mp.weixin.qq.com');
  if (isWechatLink) {
    if (title) {
      return `<a href="${href}" title="${title}">${text}</a>`;
    }
    return `<a href="${href}">${text}</a>`;
  }
  // еӨ–й“ҫд№ҹдҝқз•ҷй“ҫжҺҘпјҲз”ЁжҲ·еҸҜж №жҚ®йңҖиҰҒеӨ„зҗҶпјү
  if (title) {
    return `<a href="${href}" title="${title}">${text}</a>`;
  }
  return `<a href="${href}">${text}</a>`;
};

// еӣҫзүҮ
renderer.image = function(href, title, text) {
  if (text && text.trim()) {
    return `<figure><img src="${href}" alt="${text}" title="${title || ''}"><figcaption>${text}</figcaption></figure>`;
  }
  return `<figure><img src="${href}" alt="${title || ''}"></figure>`;
};

// д»Јз Ғеқ—
renderer.code = function(code, language) {
  const lines = code.split('\n');
  // еҺ»жҺүжңҖеҗҺдёҖдёӘз©әиЎҢ
  if (lines.length > 0 && lines[lines.length - 1].trim() === '') {
    lines.pop();
  }

  const lineNumbers = lines.map((_, i) => `<li></li>`).join('');
  const codeLines = lines.join('\n');

  const langAttr = language ? ` class="language-${language}"` : '';

  return `<div class="code-snippet__fix">` +
    `<ul class="code-snippet__line-index">${lineNumbers}</ul>` +
    `<pre><code${langAttr}>${codeLines}</code></pre>` +
    `</div>`;
};

// иЎЁж ј - ж·»еҠ е®№еҷЁ
renderer.table = function(header, body) {
  return `<div class="table-container"><table><thead>${header}</thead><tbody>${body}</tbody></table></div>`;
};

// еҲ йҷӨзәҝ
renderer.del = function(text) {
  return `<del>${text}</del>`;
};

// ејәи°ғ
renderer.em = function(text) {
  return `<em>${text}</em>`;
};

// еҠ зІ—
renderer.strong = function(text) {
  return `<strong>${text}</strong>`;
};

// еҲҶйҡ”зәҝ
renderer.hr = function() {
  return `<hr>`;
};

// еј•з”Ё
renderer.blockquote = function(quote) {
  return `<blockquote>${quote}</blockquote>`;
};

// иЎҢеҶ…д»Јз Ғ
renderer.codespan = function(code) {
  return `<code>${code}</code>`;
};

// ============ й…ҚзҪ® marked ============
marked.setOptions({
  renderer: renderer,
  gfm: true,
  breaks: false,
  pedantic: false,
  smartLists: true,
  smartypants: false,
  langPrefix: 'language-',
  headerIds: false,
  mangle: false
});

// ============ е®һж—¶жёІжҹ“ ============
const editor = document.getElementById('markdown-editor');
const preview = document.getElementById('preview-content');
const charCount = document.getElementById('char-count');

function renderMarkdown() {
  const markdown = editor.value;

  // жӣҙж–°еӯ—ж•°з»ҹи®Ў
  const count = markdown.replace(/\s/g, '').length;
  charCount.textContent = count + ' еӯ—';

  if (markdown.trim() === '') {
    preview.innerHTML = `<section id="nice" data-tool="markdown2wechat" data-website="https://github.com">
      <p style="color:#999;text-align:center;margin-top:60px;">еңЁе·Ұдҫ§иҫ“е…Ҙ MarkdownпјҢиҝҷйҮҢдјҡе®һж—¶жҳҫзӨәйў„и§Ҳж•Ҳжһң</p>
    </section>`;
    return;
  }

  try {
    // и§Јжһҗ markdown
    let html = marked.parse(markdown);

    // еӨ„зҗҶи„ҡжіЁж Үи®° [^1] - з®ҖеҚ•зҡ„и„ҡжіЁж”ҜжҢҒ
    html = html.replace(/\[(\d+)\]/g, '<sup class="footnote-ref">[$1]</sup>');

    // еҢ…иЈ…еңЁ nice е®№еҷЁдёӯ
    html = `<section id="nice" data-tool="markdown2wechat" data-website="https://github.com">${html}</section>`;

    preview.innerHTML = html;
  } catch (e) {

// еӨҚеҲ¶еҲ°еҫ®дҝЎе…¬дј—еҸ·
function copyToWechat() {
  const niceContent = preview.querySelector('#nice');
  if (!niceContent) {
    showToast('жІЎжңүеҸҜеӨҚеҲ¶зҡ„еҶ…е®№');
    return;
  }

  // иҺ·еҸ–е®Ңж•ҙ HTML
  const html = niceContent.outerHTML;

  // иҺ·еҸ–зәҜж–Үжң¬пјҲз”ЁдәҺжЈҖжҹҘпјү
  const text = niceContent.innerText;

  if (!text.trim()) {
    showToast('жІЎжңүеҸҜеӨҚеҲ¶зҡ„еҶ…е®№');
    return;
  }

  // дҪҝз”Ё Clipboard API еӨҚеҲ¶еҜҢж–Үжң¬
  const blob = new Blob([html], { type: 'text/html' });
  const clipboardItem = new ClipboardItem({
    'text/html': blob,
    'text/plain': new Blob([text], { type: 'text/plain' })
  });

  navigator.clipboard.write([clipboardItem]).then(() => {
    showToast('вң… е·ІеӨҚеҲ¶пјҒиҜ·зІҳиҙҙеҲ°еҫ®дҝЎе…¬дј—еҸ·зј–иҫ‘еҷЁдёӯ');
  }).catch(() => {
    // йҷҚзә§пјҡеӨҚеҲ¶еҲ°йҡҗи—ҸеҢәеҹҹ
    fallbackCopy(html, text);
  });
}

// йҷҚзә§еӨҚеҲ¶ж–№жЎҲ
function fallbackCopy(html, text) {
  const container = document.createElement('div');
  container.style.position = 'fixed';
  container.style.left = '-9999px';
  container.style.top = '0';
  container.innerHTML = html;
  document.body.appendChild(container);

  const range = document.createRange();
  range.selectNodeContents(container);
  const selection = window.getSelection();
  selection.removeAllRanges();
  selection.addRange(range);

  try {
    document.execCommand('copy');
    showToast('вң… е·ІеӨҚеҲ¶пјҒиҜ·зІҳиҙҙеҲ°еҫ®дҝЎе…¬дј—еҸ·зј–иҫ‘еҷЁдёӯ');
  } catch (e) {
    // жңҖз»ҲйҷҚзә§пјҡеҸӘеӨҚеҲ¶зәҜж–Үжң¬
    navigator.clipboard.writeText(text).then(() => {
      showToast('вҡ пёҸ е·ІеӨҚеҲ¶зәҜж–Үжң¬пјҲеҜҢж–Үжң¬еӨҚеҲ¶еӨұиҙҘпјү');
    });
  }

  selection.removeAllRanges();
  document.body.removeChild(container);
}

// жҸҗеҸ–дё»йўҳ CSS
function extractThemeCSS() {
  const styleEl = document.querySelector('style');
  if (!styleEl) return '';
  const css = styleEl.textContent;
  // жҸҗеҸ– #nice зӣёе…ізҡ„ж ·ејҸпјҲй»ҳи®Өдё»йўҳйғЁеҲҶпјү
  const match = css.match(/\/\*=+\s*й»ҳи®Өдё»йўҳ[\s\S]*/);
  return match ? match[0] : css;
}

// Toast жҸҗзӨә
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}
