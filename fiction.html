---
layout: default
title: Read And Chedan
---
<ul id="category-posts">
{% for post in site.posts %}
{% if post.path contains '_posts/fiction' %}
<li class="post-item">
    <div class="post-date">{{ post.date | date_to_string }}</div>
    <a href="{{ post.url }}">{{ post.title }}</a>
</li>
{% endif %}
{% endfor %}
</ul>

<div id="pagination" class="pagination" style="display:none;margin-top:1.5rem;">
    <a href="javascript:void(0)" id="prev-page" class="prev">&larr; Previous</a>
    <span id="page-info" style="margin:0 1rem;"></span>
    <a href="javascript:void(0)" id="next-page" class="next">Next &rarr;</a>
</div>
